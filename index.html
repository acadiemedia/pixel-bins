<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Bin Heroes | Global Community</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --mario-red: #E52521;
            --mario-blue: #0492CF;
            --coin-gold: #FFD700;
            --luigi-green: #43B047;
            --power-purple: #7544B1;
            --dark-bg: #121212;
            --white: #FFFFFF;
            --grey-800: #1a1a1a;
            --neon-blue: #00f3ff;
            --font-pixel: 'Press Start 2P', cursive;
            --font-retro: 'VT323', monospace;
        }

        body { 
            margin: 0; padding: 0; background-color: var(--dark-bg); 
            display: flex; justify-content: center; font-family: var(--font-retro);
            min-height: 100vh; overflow-x: hidden;
        }

        .app-shell {
            width: 100%; max-width: 480px;
            background: linear-gradient(135deg, #5C94FC 0%, #4b80e1 100%);
            border-left: 8px solid #000; border-right: 8px solid #000;
            box-shadow: 0 0 100px rgba(0,0,0,0.8); min-height: 100vh;
            display: flex; flex-direction: column; box-sizing: border-box;
            position: relative;
        }

        * { box-sizing: border-box; border-radius: 0 !important; }
        h1, h2, h3, .pixel-font { font-family: var(--font-pixel); text-transform: uppercase; }

        nav { background: var(--mario-red); padding: 1rem; border-bottom: 8px solid #000; z-index: 100; position: sticky; top: 0; }
        .logo-text { font-size: 0.8rem; color: white; text-shadow: 4px 4px 0 #000; text-align: center; margin-bottom: 10px; }
        .nav-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }

        .btn {
            display: block; width: 100%; padding: 10px; font-family: var(--font-pixel); font-size: 0.4rem;
            border: 4px solid #000; background: var(--coin-gold); color: #000;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5); text-decoration: none; text-align: center;
        }
        .btn:active { box-shadow: none; transform: translate(4px, 4px); }

        .view { display: none; width: 100%; padding: 1rem; flex-grow: 1; animation: fadeIn 0.4s ease-out; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #map { height: 250px; border: 6px solid #000; margin-bottom: 1.5rem; width: 100%; z-index: 10; }

        .card-grid { display: flex; flex-direction: column; gap: 1.5rem; width: 100%; padding-bottom: 2rem;}
        .pixel-card { background: #fff; color: #000; border: 4px solid #000; padding: 1.2rem; text-align: center; box-shadow: 8px 8px 0 rgba(0,0,0,0.3); }

        .auth-container { background: #fff; border: 6px solid #000; padding: 1.5rem; color: #000; }
        .form-group { margin-bottom: 1rem; text-align: left; }
        .form-group label { display: block; font-size: 0.5rem; font-family: var(--font-pixel); margin-bottom: 5px; }
        input { width: 100%; padding: 8px; border: 4px solid #000; font-family: var(--font-retro); font-size: 1.2rem; }

        footer { text-align: center; padding: 1.5rem; background: #000; color: #888; font-size: 0.6rem; }
        
        .modal-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; border: 8px solid var(--mario-red); padding: 1.5rem; width: 100%; color: #000; }
    </style>
</head>
<body>

    <div class="app-shell">
        <nav>
            <div class="logo-text pixel-font" onclick="switchView('home')">PIXEL BIN HEROES</div>
            <div class="nav-buttons">
                <button class="btn" onclick="switchView('home')">MAP</button>
                <button class="btn" onclick="switchView('leaderboard')" style="background:var(--mario-blue); color:white;">RANKS</button>
                <button class="btn" onclick="switchView('register')" style="background:var(--luigi-green); color:white;">JOIN</button>
            </div>
        </nav>

        <main>
            <!-- HOME -->
            <section id="home-view" class="view active">
                <div id="map"></div>
                <h2 class="pixel-font" style="font-size: 0.6rem; text-align: center; margin-bottom: 1rem; color: white;">REAL-TIME HEROES</h2>
                <div id="profiles-container" class="card-grid"></div>
            </section>

            <!-- LEADERBOARD -->
            <section id="leaderboard-view" class="view">
                <h2 class="pixel-font" style="color:white; text-align:center; margin-bottom:1rem;">LEADERBOARD</h2>
                <div id="leaderboard-container" class="card-grid"></div>
            </section>

            <!-- REGISTER -->
            <section id="register-view" class="view">
                <h2 class="pixel-font" style="color:white; text-align:center; margin-bottom:1rem;">JOIN WORLD</h2>
                <div class="auth-container">
                    <form id="signup-form">
                        <div class="form-group"><label>HERO ALIAS</label><input type="text" id="name" required></div>
                        <div class="form-group"><label>NEIGHBORHOOD</label><input type="text" id="neighborhood" required></div>
                        <div class="form-group"><label>TEAM / GUILD</label><input type="text" id="guild" placeholder="Freelance"></div>
                        <button type="submit" class="btn" style="background:var(--luigi-green); color:white; padding:15px; font-size:0.6rem;">START MISSION</button>
                    </form>
                </div>
            </section>
        </main>

        <footer>
            <p>2026 PIXEL BIN HEROES | SHARED WORLD ONLINE</p>
        </footer>

        <div id="booking-modal" class="modal-overlay">
            <div class="modal-box">
                <h2 class="pixel-font" style="font-size: 0.7rem; margin-bottom: 1rem;">HIRE HERO</h2>
                <p id="booking-info" style="margin-bottom: 1.5rem; font-size: 1.2rem;"></p>
                <button class="btn" style="background:var(--luigi-green); color:white;" onclick="confirmMission()">DEPLOY HERO</button>
                <button class="btn" style="background:#ccc;" onclick="closeModal()">CANCEL</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- REAL SHARED DATABASE (npoint.io bridge) ---
        const DB_ID = 'e9036f0605a9607f287f';
        const DB_URL = `https://api.npoint.io/${DB_ID}`;

        let map, heroes = [], currentHeroId = null;

        async function initApp() {
            initMap();
            await fetchWorldData();
        }

        async function fetchWorldData() {
            try {
                const response = await fetch(DB_URL);
                const data = await response.json();
                heroes = data.heroes || [];
                renderWorld();
            } catch (e) { console.error("Sync Error", e); }
        }

        async function saveWorldData() {
            await fetch(DB_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ heroes })
            });
            renderWorld();
        }

        function initMap() {
            map = L.map('map', { scrollWheelZoom: false }).setView([47.54, -52.75], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        function renderWorld() {
            const container = document.getElementById('profiles-container');
            const lbContainer = document.getElementById('leaderboard-container');
            container.innerHTML = '';
            if(lbContainer) lbContainer.innerHTML = '';

            map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });

            heroes.sort((a,b) => b.xp - a.xp).forEach(h => {
                // Map
                L.marker([h.lat, h.lng]).addTo(map).bindPopup(`<b>${h.nickname}</b><br><button onclick="openBooking('${h.id}')" style="cursor:pointer">Hire</button>`);
                
                // Cards
                const card = document.createElement('div');
                card.className = 'pixel-card';
                card.innerHTML = `
                    <div style="font-family:var(--font-pixel); font-size:0.4rem; color:var(--power-purple); margin-bottom:5px;">LVL ${Math.floor(h.xp/1000)+1} HERO</div>
                    <div class="pixel-font" style="font-size:0.7rem; margin-bottom:10px;">${h.nickname}</div>
                    <div style="background:#000; color:#fff; padding:5px; font-size:0.8rem; margin:5px 0;">📍 ${h.neighborhood}</div>
                    <div style="color:var(--coin-gold); font-size:0.9rem;">XP: ${h.xp}</div>
                    <button class="btn" style="background:var(--luigi-green); color:white; margin-top:10px;" onclick="openBooking('${h.id}')">HIRE HERO</button>
                `;
                container.appendChild(card);
            });
        }

        function switchView(id) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(id + '-view').classList.add('active');
            if(id === 'home' && map) setTimeout(() => map.invalidateSize(), 200);
        }

        function openBooking(id) {
            currentHeroId = id;
            const hero = heroes.find(h => h.id == id);
            document.getElementById('booking-info').innerText = `DEPLOY ${hero.nickname.toUpperCase()}?`;
            document.getElementById('booking-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('booking-modal').classList.remove('active'); }

        async function confirmMission() {
            const hero = heroes.find(h => h.id == currentHeroId);
            if(hero) {
                hero.xp += 150;
                await saveWorldData();
                alert("MISSION DEPLOYED! XP GRANTED.");
                closeModal();
            }
        }

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newHero = {
                id: Date.now(),
                nickname: document.getElementById('name').value,
                neighborhood: document.getElementById('neighborhood').value,
                guild: document.getElementById('guild').value || "Freelance",
                xp: 0,
                lat: 47.54 + (Math.random()*0.06-0.03),
                lng: -52.75 + (Math.random()*0.06-0.03)
            };
            heroes.push(newHero);
            await saveWorldData();
            alert("HERO CREATED! WELCOME TO THE WORLD.");
            switchView('home');
        });

        window.onload = initApp;
    </script>
</body>
</html>

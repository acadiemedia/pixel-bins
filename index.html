<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Bin Heroes | Global World V4</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --mario-red: #E52521;
            --mario-blue: #0492CF;
            --coin-gold: #FFD700;
            --luigi-green: #43B047;
            --power-purple: #7544B1;
            --dark-bg: #121212;
            --white: #FFFFFF;
        }

        body { 
            margin: 0; padding: 0; background-color: var(--dark-bg); 
            display: flex; justify-content: center; font-family: 'VT323', monospace;
            min-height: 100vh; overflow-x: hidden;
        }

        .app-shell {
            width: 100%; max-width: 480px;
            background: linear-gradient(135deg, #5C94FC 0%, #4b80e1 100%);
            border-left: 8px solid #000; border-right: 8px solid #000;
            box-shadow: 0 0 100px rgba(0,0,0,0.8); min-height: 100vh;
            display: flex; flex-direction: column; position: relative;
            box-sizing: border-box;
        }

        * { box-sizing: border-box; border-radius: 0 !important; }
        h1, h2, h3, .pixel-font { font-family: 'Press Start 2P', cursive; text-transform: uppercase; }

        nav { background: var(--mario-red); padding: 1rem; border-bottom: 8px solid #000; z-index: 100; position: sticky; top: 0; }
        .logo-text { font-size: 0.8rem; color: white; text-shadow: 4px 4px 0 #000; text-align: center; margin-bottom: 15px; cursor: pointer; }
        .nav-buttons { display: flex; justify-content: center; gap: 10px; }

        .btn {
            display: block; width: 100%; padding: 10px; font-family: 'Press Start 2P', cursive; font-size: 0.4rem;
            border: 4px solid #000; background: var(--coin-gold); color: #000;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5); text-decoration: none; text-align: center;
        }
        .btn:active { box-shadow: none; transform: translate(4px, 4px); }
        .btn-green { background: var(--luigi-green); color: white; }

        .view { display: none; width: 100%; padding: 1rem; flex-grow: 1; animation: fadeIn 0.4s ease-out; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .pixel-art { width: 100%; background: #000; border: 4px solid white; padding: 5px; margin-bottom: 1rem; }
        #map { height: 250px; border: 6px solid #000; margin-bottom: 1.5rem; width: 100%; z-index: 10; }

        .card-grid { display: flex; flex-direction: column; gap: 1.5rem; width: 100%; padding-bottom: 2rem;}
        .pixel-card { 
            background: #fff; color: #000; border: 6px solid #000; 
            padding: 1.2rem; text-align: center; 
            box-shadow: 8px 8px 0 rgba(0,0,0,0.3); width: 100%;
        }
        .avatar-box { width: 60px; height: 60px; margin: 0 auto 10px; border: 4px solid #000; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 2rem; }

        .form-group { margin-bottom: 1rem; text-align: left; }
        .form-group label { display: block; font-size: 0.55rem; font-family: 'Press Start 2P'; margin-bottom: 8px; }
        input { width: 100%; padding: 10px; border: 4px solid #000; font-family: 'VT323'; font-size: 1.4rem; }

        footer { text-align: center; padding: 1rem; background: #000; color: #888; font-size: 0.6rem; }

        #debug-console { 
            background: #000; color: #39ff14; font-family: monospace; 
            font-size: 10px; padding: 10px; height: 80px; overflow-y: scroll;
            border-top: 4px solid #333;
        }
    </style>
</head>
<body>

    <div class="app-shell">
        <nav>
            <div class="logo-text pixel-font" onclick="switchView('home')">PIXEL BIN HEROES</div>
            <div class="nav-buttons">
                <button class="btn" onclick="switchView('home')">WORLD MAP</button>
                <button class="btn btn-green" onclick="switchView('register')">JOIN NOW</button>
            </div>
        </nav>

        <main>
            <section id="home-view" class="view active">
                <div class="pixel-art">
                    <svg viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
                        <rect width="100" height="50" fill="#5C94FC" /><rect x="70" y="20" width="15" height="25" fill="#43B047" /><rect x="25" y="20" width="12" height="25" fill="#E52521" /><rect x="47" y="22" width="6" height="6" fill="#FFD700" />
                    </svg>
                </div>
                <div id="map"></div>
                <div id="profiles-container" class="card-grid"></div>
            </section>

            <section id="register-view" class="view">
                <h2 class="pixel-font" style="color:white; text-align:center; margin-bottom:1rem;">JOIN WORLD</h2>
                <div style="background:#fff; padding:1.5rem; border:6px solid #000;">
                    <form id="signup-form">
                        <div class="form-group"><label>HERO ALIAS</label><input type="text" id="reg-name" required></div>
                        <div class="form-group"><label>NEIGHBORHOOD</label><input type="text" id="reg-neighborhood" required></div>
                        <div class="form-group"><label>CONTACT (HIDDEN)</label><input type="text" id="reg-contact" required></div>
                        <button type="submit" class="btn btn-green" id="reg-btn" style="width:100%; padding:15px; font-size:0.65rem;">PUBLISH PROFILE</button>
                    </form>
                </div>
            </section>
        </main>

        <div id="debug-console">BOOTING SYSTEM...</div>

        <footer>
            <p>2026 PIXEL BIN HEROES | KVDB ACTIVE</p>
        </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- INDUSTRIAL KVDB STORAGE ---
        const DB_URL = 'https://kvdb.io/D7Lqf8X4G9zL2m5v6N1p9R/heroes_v4'; 
        const LOCAL_KEY = 'pixel_bins_resilience_v4';
        let heroes = [];

        function log(msg) {
            const el = document.getElementById('debug-console');
            el.innerHTML += `<div>> ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        }

        async function initApp() {
            log("System Initializing...");
            initMap();
            
            // 1. Load Local Gold
            const cached = localStorage.getItem(LOCAL_KEY);
            if(cached) {
                log("Local Cache Loaded.");
                heroes = JSON.parse(cached);
                render();
            }

            // 2. Fetch Global
            log("Connecting to Global World...");
            try {
                const res = await fetch(DB_URL);
                const cloudData = await res.json();
                if(Array.isArray(cloudData)) {
                    log(`Syncing ${cloudData.length} heroes...`);
                    // Merge
                    cloudData.forEach(gh => {
                        if(!heroes.find(lh => lh.id === gh.id)) heroes.push(gh);
                    });
                    saveLocal();
                    render();
                    log("World Synced.");
                }
            } catch (e) { log("Running in Local Mode."); }
        }

        function saveLocal() { localStorage.setItem(LOCAL_KEY, JSON.stringify(heroes)); }

        async function pushGlobal() {
            log("Pushing to Global World...");
            try {
                const res = await fetch(DB_URL, {
                    method: 'POST',
                    body: JSON.stringify(heroes)
                });
                if(res.ok) log("Global Push OK.");
                else log("Global Push FAILED.");
            } catch (e) { log("Network Error."); }
        }

        function initMap() {
            window.map = L.map('map', { scrollWheelZoom: false }).setView([47.54, -52.75], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(window.map);
        }

        function render() {
            const container = document.getElementById('profiles-container');
            container.innerHTML = '';
            map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
            
            heroes.forEach(h => {
                L.marker([h.lat, h.lng]).addTo(map).bindPopup(`<b>${h.name}</b><br>${h.neighborhood}`);
                const card = document.createElement('div');
                card.className = 'pixel-card';
                card.innerHTML = `<div class="avatar-box">🦸‍♂️</div><div class="pixel-font" style="font-size:0.7rem; margin-bottom:10px;">${h.name}</div><div style="background:#000; color:#fff; padding:5px; font-size:0.8rem; margin:10px 0;">📍 ${h.neighborhood}</div><button class="btn btn-green" onclick="alert('Sending mission to secret contact...')">DISPATCH</button>`;
                container.appendChild(card);
            });
        }

        function switchView(id) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(id + '-view').classList.add('active');
            if(id === 'home' && window.map) setTimeout(() => window.map.invalidateSize(), 200);
        }

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newHero = {
                id: Date.now().toString(),
                name: document.getElementById('reg-name').value,
                neighborhood: document.getElementById('reg-neighborhood').value,
                contact: document.getElementById('reg-contact').value,
                lat: 47.54 + (Math.random()*0.06-0.03),
                lng: -52.75 + (Math.random()*0.06-0.03)
            };
            
            heroes.push(newHero);
            saveLocal();
            render();
            log("Local Save OK.");
            
            await pushGlobal();
            alert("SUCCESS! YOU ARE GLOBAL.");
            switchView('home');
        });

        window.onload = initApp;
    </script>
</body>
</html>

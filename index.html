<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Bin Heroes | St. John's & Mount Pearl</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --mario-red: #E52521;
            --mario-blue: #0492CF;
            --coin-gold: #FFD700;
            --luigi-green: #43B047;
            --dark-bg: #121212;
            --white: #FFFFFF;
        }

        body { 
            margin: 0; padding: 0; background-color: var(--dark-bg); 
            display: flex; justify-content: center; font-family: 'VT323', monospace;
            min-height: 100vh; overflow-x: hidden;
        }

        .app-shell {
            width: 100%; max-width: 480px;
            background-color: #5C94FC;
            background-image: linear-gradient(45deg, #4b80e1 25%, transparent 25%), linear-gradient(-45deg, #4b80e1 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #4b80e1 75%), linear-gradient(-45deg, transparent 75%, #4b80e1 75%);
            background-size: 40px 40px;
            border-left: 8px solid #000; border-right: 8px solid #000;
            box-shadow: 0 0 100px rgba(0,0,0,0.8); min-height: 100vh;
            display: flex; flex-direction: column; position: relative;
        }

        * { box-sizing: border-box; border-radius: 0 !important; }
        h1, h2, h3, .pixel-font { font-family: 'Press Start 2P', cursive; text-transform: uppercase; }

        nav { background: var(--mario-red); padding: 1rem; border-bottom: 8px solid #000; z-index: 100; }
        .logo-text { font-size: 1rem; color: white; text-shadow: 4px 4px 0 #000; text-align: center; margin-bottom: 10px; cursor: pointer; }
        .nav-buttons { display: flex; justify-content: center; gap: 10px; }

        .btn {
            padding: 10px; font-family: 'Press Start 2P', cursive; font-size: 0.6rem;
            cursor: pointer; border: 4px solid #000;
            background: var(--coin-gold); color: #000;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5); text-decoration: none;
        }
        .btn:active { box-shadow: none; transform: translate(4px, 4px); }
        .btn-green { background: var(--luigi-green); color: white; }

        .view { display: none; width: 100%; padding: 1rem; flex-grow: 1; }
        .view.active { display: block; }

        #map { height: 250px; border: 6px solid #000; margin-bottom: 1.5rem; width: 100%; }

        .card-grid { display: flex; flex-direction: column; gap: 1.5rem; width: 100%; padding-bottom: 2rem;}
        .pixel-card { 
            background: #fff; color: #000; border: 6px solid #000; 
            padding: 1.5rem; text-align: center; 
            box-shadow: 8px 8px 0 rgba(0,0,0,0.3);
        }
        .contact-info { background: #eee; border: 2px dashed #000; padding: 10px; margin-top: 10px; font-weight: bold; }

        .form-group { margin-bottom: 1rem; text-align: left; }
        .form-group label { display: block; font-size: 0.6rem; font-family: 'Press Start 2P'; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 4px solid #000; font-family: 'VT323'; font-size: 1.4rem; }

        footer { text-align: center; padding: 1.5rem; background: #000; color: #888; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="app-shell">
        <nav>
            <div class="logo-text pixel-font" onclick="switchView('home')">PIXEL BIN HEROES</div>
            <div class="nav-buttons">
                <button class="btn" onclick="switchView('home')">VIEW MAP</button>
                <button class="btn btn-green" onclick="switchView('register')">JOIN NOW</button>
            </div>
        </nav>

        <!-- HOME -->
        <div id="home-view" class="view active">
            <div id="map"></div>
            <h2 class="pixel-font" style="font-size: 0.8rem; text-align: center; margin-bottom: 1rem; color: white;">LOCAL CLEANERS</h2>
            <div id="profiles-container" class="card-grid"></div>
        </div>

        <!-- REGISTER -->
        <div id="register-view" class="view">
            <h2 class="pixel-font" style="color:white; text-align:center; margin-bottom:1rem;">CREATE PROFILE</h2>
            <div style="background:#fff; padding:1.5rem; border:6px solid #000;">
                <form id="signup-form">
                    <div class="form-group"><label>YOUR NAME</label><input type="text" id="name" required placeholder="Mario"></div>
                    <div class="form-group"><label>NEIGHBORHOOD</label><input type="text" id="neighborhood" required placeholder="Cowan Heights"></div>
                    <div class="form-group"><label>CONTACT (PHONE/EMAIL)</label><input type="text" id="contact" required placeholder="709-000-0000"></div>
                    <button type="submit" class="btn btn-green" style="width:100%; padding:15px; font-size:0.8rem;">PUBLISH AD</button>
                </form>
            </div>
        </div>

        <footer>
            <p>2026 PIXEL BIN HEROES | ST. JOHN'S, NL</p>
        </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const DB_ENDPOINT = 'https://api.npoint.io/e9036f0605a9607f287f';
        let map, heroes = [];

        async function initApp() {
            initMap();
            // Load from LocalStorage immediately for instant persistence
            const cached = localStorage.getItem('pb_heroes_local');
            if(cached) {
                heroes = JSON.parse(cached);
                renderWorld();
            }
            await fetchGlobalData();
        }

        async function fetchGlobalData() {
            try {
                const response = await fetch(DB_ENDPOINT);
                const data = await response.json();
                if(data.heroes) {
                    heroes = data.heroes;
                    localStorage.setItem('pb_heroes_local', JSON.stringify(heroes));
                    renderWorld();
                }
            } catch (e) { console.error("Sync Error", e); }
        }

        async function saveGlobalData() {
            localStorage.setItem('pb_heroes_local', JSON.stringify(heroes));
            renderWorld();
            try {
                await fetch(DB_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ heroes })
                });
            } catch (e) { alert("Saved locally! Global sync failed."); }
        }

        function initMap() {
            map = L.map('map', { scrollWheelZoom: false }).setView([47.54, -52.75], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        function renderWorld() {
            const container = document.getElementById('profiles-container');
            container.innerHTML = '';
            map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });

            heroes.forEach(h => {
                L.marker([h.lat, h.lng]).addTo(map).bindPopup(`<b>${h.name}</b><br>${h.neighborhood}<br>Contact: ${h.contact}`);
                
                const card = document.createElement('div');
                card.className = 'pixel-card';
                card.innerHTML = `
                    <div class="pixel-font" style="font-size:0.8rem; margin-bottom:10px;">${h.name}</div>
                    <div style="background:#000; color:#fff; padding:5px; margin-bottom:10px;">📍 ${h.neighborhood}</div>
                    <div class="contact-info">📞 ${h.contact}</div>
                    <p style="margin-top:10px; font-size:0.9rem;">Tap Method Above to Hire!</p>
                `;
                container.appendChild(card);
            });
        }

        function switchView(id) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(id + '-view').classList.add('active');
            if(id === 'home' && map) setTimeout(() => map.invalidateSize(), 200);
        }

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newHero = {
                id: Date.now(),
                name: document.getElementById('name').value,
                neighborhood: document.getElementById('neighborhood').value,
                contact: document.getElementById('contact').value,
                lat: 47.54 + (Math.random()*0.06-0.03),
                lng: -52.75 + (Math.random()*0.06-0.03)
            };
            heroes.push(newHero);
            await saveGlobalData();
            alert("SUCCESS! AD PUBLISHED.");
            switchView('home');
        });

        window.onload = initApp;
    </script>
</body>
</html>

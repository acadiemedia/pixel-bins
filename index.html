<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Bin Heroes | Ultra Resilience Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --mario-red: #E52521;
            --mario-blue: #0492CF;
            --coin-gold: #FFD700;
            --luigi-green: #43B047;
            --power-purple: #7544B1;
            --dark-bg: #121212;
            --white: #FFFFFF;
        }

        body { 
            margin: 0; padding: 0; background-color: var(--dark-bg); 
            display: flex; justify-content: center; font-family: 'VT323', monospace;
            min-height: 100vh; overflow-x: hidden;
        }

        .app-shell {
            width: 100%; max-width: 480px;
            background: linear-gradient(135deg, #5C94FC 0%, #4b80e1 100%);
            border-left: 8px solid #000; border-right: 8px solid #000;
            box-shadow: 0 0 100px rgba(0,0,0,0.8); min-height: 100vh;
            display: flex; flex-direction: column; position: relative;
            box-sizing: border-box;
        }

        * { box-sizing: border-box; border-radius: 0 !important; }
        h1, h2, h3, .pixel-font { font-family: 'Press Start 2P', cursive; text-transform: uppercase; }

        nav { background: var(--mario-red); padding: 1rem; border-bottom: 8px solid #000; z-index: 100; position: sticky; top: 0; }
        .logo-text { font-size: 0.8rem; color: white; text-shadow: 4px 4px 0 #000; text-align: center; margin-bottom: 15px; cursor: pointer; }
        .nav-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn {
            display: block; width: 100%; padding: 10px; font-family: 'Press Start 2P', cursive; font-size: 0.45rem;
            border: 4px solid #000; background: var(--coin-gold); color: #000;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5); text-decoration: none; text-align: center;
        }
        .btn:active { box-shadow: none; transform: translate(4px, 4px); }
        .btn-green { background: var(--luigi-green); color: white; }

        .view { display: none; width: 100%; padding: 1rem; flex-grow: 1; animation: fadeIn 0.4s ease-out; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hero-banner { text-align: center; padding: 1rem 0; }
        .hero-banner h1 { font-size: 1.2rem; color: white; text-shadow: 4px 4px 0 #000; margin-bottom: 1rem; }
        .pixel-art { width: 100%; background: #000; border: 4px solid white; padding: 5px; margin-bottom: 1rem; }

        #map { height: 250px; border: 6px solid #000; margin-bottom: 1.5rem; width: 100%; z-index: 10; }

        .card-grid { display: flex; flex-direction: column; gap: 2rem; width: 100%; padding-bottom: 2rem;}
        .pixel-card { 
            background: #fff; color: #000; border: 6px solid #000; 
            padding: 1.2rem; text-align: center; 
            box-shadow: 8px 8px 0 rgba(0,0,0,0.3); width: 100%;
        }
        .avatar-box { width: 60px; height: 60px; margin: 0 auto 10px; border: 4px solid #000; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 2rem; }

        .form-group { margin-bottom: 1rem; text-align: left; }
        .form-group label { display: block; font-size: 0.55rem; font-family: 'Press Start 2P'; margin-bottom: 8px; }
        input { width: 100%; padding: 10px; border: 4px solid #000; font-family: 'VT323'; font-size: 1.4rem; }

        footer { text-align: center; padding: 1.5rem; background: #000; color: #888; font-size: 0.6rem; }
        
        .modal-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; border: 8px solid var(--mario-red); padding: 1.5rem; width: 100%; color: #000; }
        
        .status-dot { width: 10px; height: 10px; border-radius: 50% !important; display: inline-block; margin-right: 5px; }
        .online { background: var(--luigi-green); box-shadow: 0 0 5px var(--luigi-green); }
        .offline { background: #666; }
    </style>
</head>
<body>

    <div class="app-shell">
        <nav>
            <div class="logo-text pixel-font" onclick="switchView('home')">PIXEL BIN HEROES</div>
            <div class="nav-buttons">
                <button class="btn" onclick="switchView('home')">WORLD MAP</button>
                <button class="btn btn-green" onclick="switchView('register')">JOIN NOW</button>
            </div>
        </nav>

        <main>
            <section id="home-view" class="view active">
                <header class="hero-banner">
                    <h1>GLOBAL HERO BOARD</h1>
                    <div class="pixel-art">
                        <svg viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
                            <rect width="100" height="50" fill="#5C94FC" /><rect x="70" y="20" width="15" height="25" fill="#43B047" /><rect x="25" y="20" width="12" height="25" fill="#E52521" /><rect x="47" y="22" width="6" height="6" fill="#FFD700" />
                        </svg>
                    </div>
                </header>
                <div id="map"></div>
                <h2 class="pixel-font" style="font-size: 0.7rem; text-align: center; margin-bottom: 1.5rem; color: white;">LOCAL HEROES</h2>
                <div id="profiles-container" class="card-grid"></div>
            </section>

            <section id="register-view" class="view">
                <h2 class="pixel-font" style="color:white; text-align:center; margin-bottom:1rem;">JOIN THE SQUAD</h2>
                <div class="auth-container" style="background:#fff; padding:1.5rem; border:6px solid #000;">
                    <form id="signup-form">
                        <div class="form-group"><label>HERO ALIAS</label><input type="text" id="reg-name" required></div>
                        <div class="form-group"><label>NEIGHBORHOOD</label><input type="text" id="reg-neighborhood" required></div>
                        <div class="form-group"><label>CONTACT (SECRET)</label><input type="text" id="reg-contact" required placeholder="Hidden Email/Phone"></div>
                        <button type="submit" class="btn btn-green" id="reg-btn" style="width:100%; padding:15px; font-size:0.8rem;">PUBLISH PROFILE</button>
                    </form>
                </div>
            </section>
        </main>

        <footer>
            <div id="sync-status" style="margin-bottom:10px;"><div class="status-dot offline"></div> SYNCING...</div>
            <p>2026 PIXEL BIN HEROES | RESILIENCE V2</p>
        </footer>

        <div id="booking-modal" class="modal-overlay">
            <div class="modal-box">
                <h2 class="pixel-font" style="font-size: 0.7rem; margin-bottom: 1rem;">MISSION DISPATCH</h2>
                <p id="booking-info" style="margin-bottom: 1.5rem; font-size: 1.2rem;"></p>
                <div class="form-group"><label>YOUR NAME</label><input type="text" id="cust-name"></div>
                <div class="form-group"><label>ADDRESS</label><input type="text" id="cust-addr"></div>
                <button class="btn btn-green" onclick="confirmMission()">DISPATCH MISSION</button>
                <button class="btn" style="background:#ccc; margin-top:10px;" onclick="closeModal()">CANCEL</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const DB_URL = 'https://api.npoint.io/e9036f0605a9607f287f';
        let map, heroes = [], currentHero = null;

        async function initApp() {
            initMap();
            // 1. LOAD LOCAL FIRST (Zero Latency)
            const cached = localStorage.getItem('pb_resilience_v2');
            if(cached) {
                heroes = JSON.parse(cached);
                renderWorld();
            }
            // 2. SYNC WITH CLOUD IN BACKGROUND
            await fetchWorld();
        }

        async function fetchWorld() {
            try {
                const response = await fetch(DB_URL);
                const data = await response.json();
                if(data && data.heroes) {
                    // Merge cloud data with local data (unique by ID)
                    const cloudHeroes = data.heroes;
                    const merged = [...heroes];
                    cloudHeroes.forEach(ch => {
                        if(!merged.find(lh => lh.id === ch.id)) merged.push(ch);
                    });
                    heroes = merged;
                    saveLocal();
                    renderWorld();
                    updateStatus(true);
                }
            } catch (e) { updateStatus(false); }
        }

        async function pushWorld() {
            updateStatus(false);
            try {
                const res = await fetch(DB_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ heroes })
                });
                if(res.ok) updateStatus(true);
            } catch (e) { console.log("Background sync failed."); }
        }

        function saveLocal() { localStorage.setItem('pb_resilience_v2', JSON.stringify(heroes)); }

        function updateStatus(isOnline) {
            const el = document.getElementById('sync-status');
            el.innerHTML = `<div class="status-dot ${isOnline ? 'online' : 'offline'}"></div> ${isOnline ? 'GLOBAL WORLD CONNECTED' : 'OFFLINE MODE (SAVING LOCALLY)'}`;
        }

        function initMap() {
            map = L.map('map', { scrollWheelZoom: false }).setView([47.54, -52.75], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        function renderWorld() {
            const container = document.getElementById('profiles-container');
            container.innerHTML = '';
            map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });

            heroes.forEach(h => {
                L.marker([h.lat, h.lng]).addTo(map).bindPopup(`<b>${h.name}</b><br>${h.neighborhood}`);
                const card = document.createElement('div'); card.className = 'pixel-card';
                card.innerHTML = `
                    <div class="avatar-box">🦸‍♂️</div>
                    <div class="pixel-font" style="font-size:0.7rem; margin-bottom:10px;">${h.name}</div>
                    <div style="background:#000; color:#fff; padding:5px; font-size:0.8rem; margin:10px 0;">📍 ${h.neighborhood}</div>
                    <button class="btn btn-green" onclick="openBooking('${h.id}')">DISPATCH HERO</button>
                `;
                container.appendChild(card);
            });
        }

        function switchView(id) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(id + '-view').classList.add('active');
            if(id === 'home' && map) setTimeout(() => map.invalidateSize(), 200);
            window.scrollTo(0,0);
        }

        function openBooking(id) {
            currentHero = heroes.find(h => h.id == id);
            document.getElementById('booking-info').innerText = `SEND MISSION TO ${currentHero.name.toUpperCase()}?`;
            document.getElementById('booking-modal').classList.add('active');
        }
        function closeModal() { document.getElementById('booking-modal').classList.remove('active'); }

        async function confirmMission() {
            if(currentHero) {
                window.location.href = `mailto:${currentHero.contact}?subject=MISSION REQUEST&body=Bin request from ${document.getElementById('cust-name').value} at ${document.getElementById('cust-addr').value}`;
                closeModal();
            }
        }

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            btn.innerText = "PUBLISHING..."; btn.disabled = true;

            const newHero = {
                id: Date.now().toString(),
                name: document.getElementById('reg-name').value,
                neighborhood: document.getElementById('reg-neighborhood').value,
                contact: document.getElementById('reg-contact').value,
                lat: 47.54 + (Math.random()*0.06-0.03),
                lng: -52.75 + (Math.random()*0.06-0.03)
            };

            // 1. SAVE LOCALLY FIRST (Immediate)
            heroes.push(newHero);
            saveLocal();
            renderWorld();

            // 2. PUSH TO CLOUD IN BACKGROUND
            await pushWorld();
            
            alert("SUCCESS! YOUR AD IS LIVE ON THIS DEVICE AND SYNCING GLOBALLY.");
            btn.innerText = "PUBLISH PROFILE"; btn.disabled = false;
            switchView('home');
        });

        window.onload = initApp;
    </script>
</body>
</html>

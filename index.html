<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Bin Heroes | Verified Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --mario-red: #E52521;
            --mario-blue: #0492CF;
            --coin-gold: #FFD700;
            --luigi-green: #43B047;
            --power-purple: #7544B1;
            --dark-bg: #121212;
            --white: #FFFFFF;
        }

        body { 
            margin: 0; padding: 0; background-color: var(--dark-bg); 
            display: flex; justify-content: center; font-family: 'VT323', monospace;
            min-height: 100vh; overflow-x: hidden;
        }

        .app-shell {
            width: 100%; max-width: 480px;
            background: linear-gradient(135deg, #5C94FC 0%, #4b80e1 100%);
            border-left: 8px solid #000; border-right: 8px solid #000;
            box-shadow: 0 0 100px rgba(0,0,0,0.8); min-height: 100vh;
            display: flex; flex-direction: column; position: relative;
            box-sizing: border-box;
        }

        * { box-sizing: border-box; border-radius: 0 !important; }
        h1, h2, h3, .pixel-font { font-family: 'Press Start 2P', cursive; text-transform: uppercase; }

        nav { background: var(--mario-red); padding: 1rem; border-bottom: 8px solid #000; z-index: 100; position: sticky; top: 0; }
        .logo-text { font-size: 0.8rem; color: white; text-shadow: 4px 4px 0 #000; text-align: center; margin-bottom: 15px; cursor: pointer; }
        .nav-buttons { display: flex; justify-content: center; gap: 10px; }

        .btn {
            display: block; width: 100%; padding: 10px; font-family: 'Press Start 2P', cursive; font-size: 0.45rem;
            border: 4px solid #000; background: var(--coin-gold); color: #000;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5); text-decoration: none; text-align: center;
        }
        .btn:active { box-shadow: none; transform: translate(4px, 4px); }
        .btn-green { background: var(--luigi-green); color: white; }

        .view { display: none; width: 100%; padding: 1rem; flex-grow: 1; animation: fadeIn 0.4s ease-out; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #map { height: 250px; border: 6px solid #000; margin-bottom: 1.5rem; width: 100%; z-index: 10; }

        .card-grid { display: flex; flex-direction: column; gap: 2rem; width: 100%; padding-bottom: 2rem;}
        .pixel-card { 
            background: #fff; color: #000; border: 6px solid #000; 
            padding: 1.2rem; text-align: center; 
            box-shadow: 8px 8px 0 rgba(0,0,0,0.3); width: 100% !important;
        }
        .avatar-box { width: 60px; height: 60px; margin: 0 auto 10px; border: 4px solid #000; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 2rem; }

        .form-group { margin-bottom: 1rem; text-align: left; }
        .form-group label { display: block; font-size: 0.55rem; font-family: 'Press Start 2P'; margin-bottom: 8px; }
        input { width: 100%; padding: 10px; border: 4px solid #000; font-family: 'VT323'; font-size: 1.4rem; }

        footer { text-align: center; padding: 1.5rem; background: #000; color: #888; font-size: 0.7rem; }
        
        #sync-status { font-family: 'Press Start 2P'; font-size: 0.4rem; color: #fff; margin-bottom: 10px; }
        .status-online { color: var(--luigi-green); }
        .status-offline { color: #888; }
    </style>
</head>
<body>

    <div class="app-shell">
        <nav>
            <div class="logo-text pixel-font" onclick="switchView('home')">PIXEL BIN HEROES</div>
            <div class="nav-buttons">
                <button class="btn" id="btn-map" onclick="switchView('home')">WORLD MAP</button>
                <button class="btn btn-green" id="btn-join" onclick="switchView('register')">JOIN NOW</button>
            </div>
        </nav>

        <main>
            <section id="home-view" class="view active">
                <div id="map"></div>
                <h2 class="pixel-font" style="font-size: 0.7rem; text-align: center; margin-bottom: 1.5rem; color: white;">LOCAL HEROES</h2>
                <div id="profiles-container" class="card-grid"></div>
            </section>

            <section id="register-view" class="view">
                <h2 class="pixel-font" style="color:white; text-align:center; margin-bottom:1rem;">JOIN THE SQUAD</h2>
                <div style="background:#fff; padding:1.5rem; border:6px solid #000;">
                    <form id="signup-form">
                        <div class="form-group"><label>HERO ALIAS</label><input type="text" id="reg-name" required></div>
                        <div class="form-group"><label>NEIGHBORHOOD</label><input type="text" id="reg-neighborhood" required></div>
                        <div class="form-group"><label>CONTACT (SECRET)</label><input type="text" id="reg-contact" required placeholder="Email/Phone"></div>
                        <button type="submit" id="submit-btn" class="btn btn-green" style="width:100%; padding:15px; font-size:0.8rem;">PUBLISH PROFILE</button>
                    </form>
                </div>
            </section>
        </main>

        <footer>
            <div id="sync-status">SYNCING WORLD...</div>
            <p>2026 PIXEL BIN HEROES | ST. JOHN'S, NL</p>
        </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const DB_URL = 'https://api.npoint.io/468874138e64e5288283';
        let map, heroes = [];

        async function initApp() {
            initMap();
            // Load Local first (Instant display)
            const cached = localStorage.getItem('pixel_bins_final_v1');
            if(cached) {
                heroes = JSON.parse(cached);
                renderWorld();
            }
            await fetchWorld();
        }

        async function fetchWorld() {
            try {
                const response = await fetch(DB_URL);
                const data = await response.json();
                if(data && data.heroes) {
                    // Update if global is different
                    heroes = data.heroes;
                    saveLocal();
                    renderWorld();
                    updateStatus(true);
                }
            } catch (e) { updateStatus(false); }
        }

        async function pushWorld() {
            try {
                await fetch(DB_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ heroes })
                });
                updateStatus(true);
            } catch (e) { updateStatus(false); }
        }

        function saveLocal() { localStorage.setItem('pixel_bins_final_v1', JSON.stringify(heroes)); }

        function updateStatus(isOnline) {
            document.getElementById('sync-status').innerHTML = isOnline ? 
                '<span class="status-online">GLOBAL SYNC ACTIVE</span>' : 
                '<span class="status-offline">SAVING LOCALLY (OFFLINE)</span>';
        }

        function initMap() {
            map = L.map('map', { scrollWheelZoom: false }).setView([47.54, -52.75], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        function renderWorld() {
            const container = document.getElementById('profiles-container');
            container.innerHTML = '';
            map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });

            heroes.forEach(h => {
                L.marker([h.lat, h.lng]).addTo(map).bindPopup(`<b>${h.name}</b><br>${h.neighborhood}`);
                const card = document.createElement('div'); card.className = 'pixel-card';
                card.innerHTML = `<div class="avatar-box">🦸‍♂️</div><div class="pixel-font" style="font-size:0.7rem; margin-bottom:10px;">${h.name}</div><div style="background:#000; color:#fff; padding:5px; font-size:0.8rem; margin:10px 0;">📍 ${h.neighborhood}</div><div style="font-weight:bold; font-size:0.9rem; margin-bottom:10px;">Privacy Protected</div><button class="btn btn-green">DISPATCH</button>`;
                container.appendChild(card);
            });
        }

        function switchView(id) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(id + '-view').classList.add('active');
            if(id === 'home' && map) setTimeout(() => map.invalidateSize(), 200);
            window.scrollTo(0,0);
        }

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "PUBLISHING..."; btn.disabled = true;

            const newHero = {
                id: Date.now().toString(),
                name: document.getElementById('reg-name').value,
                neighborhood: document.getElementById('reg-neighborhood').value,
                contact: document.getElementById('reg-contact').value,
                lat: 47.54 + (Math.random()*0.06-0.03),
                lng: -52.75 + (Math.random()*0.06-0.03)
            };

            heroes.push(newHero);
            saveLocal();
            renderWorld();
            await pushWorld();
            
            alert("SUCCESS! YOU ARE LIVE.");
            btn.innerText = "PUBLISH PROFILE"; btn.disabled = false;
            switchView('home');
        });

        window.onload = initApp;
    </script>
</body>
</html>

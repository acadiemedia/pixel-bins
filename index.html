<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Bin Heroes | Full-Stack Edition</title>
    
    <!-- Pixel Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --mario-red: #E52521;
            --mario-blue: #0492CF;
            --coin-gold: #FFD700;
            --luigi-green: #43B047;
            --power-purple: #7544B1;
            --dark-bg: #121212;
            --white: #FFFFFF;
        }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--dark-bg); 
            display: flex; justify-content: center;
            font-family: 'VT323', monospace;
            min-height: 100vh;
        }

        .app-shell {
            width: 100%; max-width: 480px;
            background-color: #5C94FC;
            background-image: linear-gradient(45deg, #4b80e1 25%, transparent 25%), linear-gradient(-45deg, #4b80e1 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #4b80e1 75%), linear-gradient(-45deg, transparent 75%, #4b80e1 75%);
            background-size: 40px 40px;
            border-left: 8px solid #000; border-right: 8px solid #000;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            min-height: 100vh; position: relative;
            display: flex; flex-direction: column;
        }

        * { box-sizing: border-box; border-radius: 0 !important; }
        h1, h2, h3, .pixel-font { font-family: 'Press Start 2P', cursive; text-transform: uppercase; }

        nav { background: var(--mario-red); padding: 1rem; border-bottom: 8px solid #000; z-index: 100; }
        .logo-text { font-size: 1rem; color: white; text-shadow: 4px 4px 0 #000; text-align: center; margin-bottom: 15px; }
        .nav-buttons { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; }
        
        .btn {
            padding: 10px; font-family: 'Press Start 2P', cursive; font-size: 0.5rem;
            cursor: pointer; border: 4px solid #000;
            background: var(--coin-gold); color: #000;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5); text-decoration: none;
        }
        .btn:active { box-shadow: none; transform: translate(4px, 4px); }
        .btn-green { background: var(--luigi-green); color: white; }
        .btn-blue { background: var(--mario-blue); color: white; }

        .view { display: none; width: 100%; padding: 1rem; flex-grow: 1; }
        .view.active { display: block; }

        /* Auth UI */
        .auth-container { background: #fff; border: 6px solid #000; padding: 1.5rem; color: #000; text-align: center; }
        .form-group { margin-bottom: 1rem; text-align: left; }
        .form-group label { display: block; font-size: 0.6rem; font-family: 'Press Start 2P'; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; border: 4px solid #000; font-family: 'VT323'; font-size: 1.2rem; }

        #map { height: 250px; border: 6px solid #000; margin-bottom: 1.5rem; width: 100%; }

        .card-grid { display: flex; flex-direction: column; gap: 1.5rem; }
        .pixel-card { background: #fff; color: #000; border: 6px solid #000; padding: 1rem; text-align: center; box-shadow: 6px 6px 0 rgba(0,0,0,0.3); }
        .avatar-box { width: 60px; height: 60px; margin: 0 auto 10px; border: 4px solid #000; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 2rem; }

        .xp-container { border: 4px solid #000; height: 20px; background: #ddd; position: relative; margin: 10px 0; overflow: hidden; }
        .xp-fill { background: var(--luigi-green); height: 100%; width: 0%; transition: width 1s; }
        .xp-text { position: absolute; width: 100%; top: 2px; left: 0; font-size: 0.4rem; font-family: 'Press Start 2P'; }

        /* Dashboard */
        .dashboard-header { background: #000; color: #fff; padding: 10px; margin-bottom: 15px; font-size: 0.7rem; }

        footer { text-align: center; padding: 2rem 1rem; background: #000; color: #888; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="app-shell">
        
        <nav>
            <div class="logo-text pixel-font">PIXEL BIN HEROES</div>
            <div class="nav-buttons">
                <button class="btn" onclick="switchView('home')">MAP</button>
                <div id="auth-nav" style="display: flex; gap: 5px;">
                    <button class="btn btn-blue" onclick="switchView('login')">LOGIN</button>
                    <button class="btn btn-green" onclick="switchView('register')">SIGN UP</button>
                </div>
                <div id="user-nav" style="display: none; gap: 5px;">
                    <button class="btn btn-blue" onclick="switchView('dashboard')">DASHBOARD</button>
                    <button class="btn btn-green" onclick="handleLogout()">LOGOUT</button>
                </div>
            </div>
        </nav>

        <!-- HOME VIEW (THE WORLD MAP) -->
        <div id="home-view" class="view active">
            <div id="map"></div>
            <h2 class="pixel-font" style="font-size: 0.7rem; text-align: center; margin-bottom: 1rem; color: white;">LOCAL HEROES</h2>
            <div id="profiles-container" class="card-grid">
                <!-- Live Data Injected Here -->
            </div>
        </div>

        <!-- LOGIN VIEW -->
        <div id="login-view" class="view">
            <h2 class="pixel-font" style="color:white; text-align:center; margin-bottom:1rem;">LOGIN</h2>
            <div class="auth-container">
                <form id="login-form">
                    <div class="form-group"><label>EMAIL</label><input type="email" id="login-email" required></div>
                    <div class="form-group"><label>PASSWORD</label><input type="password" id="login-password" required></div>
                    <button type="submit" class="btn btn-blue" style="width:100%; margin-top:10px;">ENTER GAME</button>
                </form>
            </div>
        </div>

        <!-- REGISTER VIEW -->
        <div id="register-view" class="view">
            <h2 class="pixel-font" style="color:white; text-align:center; margin-bottom:1rem;">NEW PLAYER</h2>
            <div class="auth-container">
                <form id="signup-form">
                    <div class="form-group"><label>EMAIL</label><input type="email" id="signup-email" required></div>
                    <div class="form-group"><label>PASSWORD</label><input type="password" id="signup-password" required></div>
                    <hr style="margin:15px 0; border:2px solid #000;">
                    <div class="form-group"><label>HERO NICKNAME</label><input type="text" id="signup-name" required></div>
                    <div class="form-group"><label>NEIGHBORHOOD</label><input type="text" id="signup-neighborhood" required></div>
                    <button type="submit" class="btn btn-green" style="width:100%; margin-top:10px;">CREATE HERO</button>
                </form>
            </div>
        </div>

        <!-- DASHBOARD VIEW -->
        <div id="dashboard-view" class="view">
            <div class="dashboard-header pixel-font">PLAYER DASHBOARD</div>
            <div class="auth-container">
                <h3 id="dash-name" class="pixel-font" style="font-size:0.8rem;">---</h3>
                <p style="margin:10px 0;">Status: ACTIVE HERO</p>
                <div class="xp-container">
                    <div class="xp-fill" style="width: 45%"></div>
                    <div class="xp-text">XP PROGRESS</div>
                </div>
                <button class="btn btn-blue" style="width:100%; margin-top:1rem;">EDIT PROFILE</button>
            </div>
        </div>

        <footer>
            <p><a href="terms-conditions.html" style="color:var(--coin-gold);">SAFETY RULES</a> | 2026 PIXEL BIN HEROES</p>
        </footer>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- Supabase Config (Replace with real keys when available) ---
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        // --- Fallback Data (Shows when DB is not connected) ---
        const fallbackHeroes = [
            { id: 1, nickname: "Bin-Buster Pete", neighborhood: "Cowan Heights", avatar: "🦸‍♂️", rating: 5, reviews: 14 },
            { id: 2, nickname: "Retro Riley", neighborhood: "Pearlview", avatar: "🛡️", rating: 4.5, reviews: 9 },
            { id: 3, nickname: "Sanitary Sam", neighborhood: "Rabbittown", avatar: "✨", rating: 5, reviews: 6 }
        ];

        let map, userSession = null;

        async function initApp() {
            initMap();
            try {
                // Initialize Supabase only if keys are provided
                if (SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
                    const { createClient } = supabase;
                    window.supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    checkSession();
                    fetchHeroes();
                } else {
                    console.log("Running in Preview Mode (No DB)");
                    renderProfiles(fallbackHeroes);
                }
            } catch (e) {
                renderProfiles(fallbackHeroes);
            }
        }

        async function fetchHeroes() {
            if (!window.supabaseClient) return renderProfiles(fallbackHeroes);
            const { data, error } = await window.supabaseClient.from('profiles').select('*');
            if(error || !data || data.length === 0) renderProfiles(fallbackHeroes);
            else renderProfiles(data);
        }

        async function checkSession() {
            if(!window.supabaseClient) return;
            const { data } = await window.supabaseClient.auth.getSession();
            userSession = data.session;
            updateUIForAuth();
        }

        function updateUIForAuth() {
            const authNav = document.getElementById('auth-nav');
            const userNav = document.getElementById('user-nav');
            if(userSession) {
                authNav.style.display = 'none';
                userNav.style.display = 'flex';
            } else {
                authNav.style.display = 'flex';
                userNav.style.display = 'none';
            }
        }

        async function handleLogout() {
            if(window.supabaseClient) await window.supabaseClient.auth.signOut();
            location.reload();
        }

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            const target = document.getElementById(viewId + '-view');
            if(target) target.classList.add('active');
            window.scrollTo(0,0);
            if(viewId === 'home' && map) setTimeout(() => map.invalidateSize(), 200);
        }

        function initMap() {
            map = L.map('map', { scrollWheelZoom: false }).setView([47.54, -52.75], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            // Add initial markers from fallback
            fallbackHeroes.forEach(kid => {
                L.marker([47.54 + (Math.random()*0.04-0.02), -52.75 + (Math.random()*0.04-0.02)]).addTo(map)
                    .bindPopup(`<b>${kid.nickname}</b><br>${kid.neighborhood}`);
            });
        }

        function renderProfiles(heroes) {
            const container = document.getElementById('profiles-container');
            container.innerHTML = '';
            heroes.forEach(hero => {
                const card = document.createElement('div');
                card.className = 'pixel-card';
                card.innerHTML = `
                    <div style="font-family:'Press Start 2P'; font-size:0.5rem; color:var(--power-purple); margin-bottom:10px;">LVL ${hero.reviews || 1}</div>
                    <div class="avatar-box">${hero.avatar || '👾'}</div>
                    <div class="pixel-font" style="font-size:0.7rem;">${hero.nickname}</div>
                    <div style="background:#000; color:#fff; padding:5px; font-size:0.8rem; margin:10px 0;">📍 ${hero.neighborhood}</div>
                    <button class="btn btn-green" style="width:100%; font-size:0.6rem;" onclick="openBooking()">HIRE HERO</button>
                `;
                container.appendChild(card);
            });
        }

        function openBooking() {
            document.getElementById('booking-info').innerText = "REQUEST BIN SANITIZATION MISSION?";
            document.getElementById('booking-modal').classList.add('active');
        }
        function closeModal() { document.getElementById('booking-modal').classList.remove('active'); }

        // --- Auth Logic ---
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!window.supabaseClient) return alert("System in Preview Mode. Database not connected.");
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const nickname = document.getElementById('signup-name').value;
            const neighborhood = document.getElementById('signup-neighborhood').value;

            const { data, error } = await window.supabaseClient.auth.signUp({ email, password });
            if(error) alert(error.message);
            else {
                await window.supabaseClient.from('profiles').insert([{ id: data.user.id, nickname, neighborhood, avatar: "🦸‍♂️" }]);
                alert('WELCOME HERO! Please confirm your email.');
                switchView('login');
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!window.supabaseClient) return alert("System in Preview Mode. Database not connected.");
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { error } = await window.supabaseClient.signInWithPassword({ email, password });
            if(error) alert(error.message);
            else location.reload();
        });

        window.onload = initApp;
    </script>
</body>
</html>

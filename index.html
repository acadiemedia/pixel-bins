<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Bin Heroes | Global Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --mario-red: #E52521;
            --mario-blue: #0492CF;
            --coin-gold: #FFD700;
            --luigi-green: #43B047;
            --power-purple: #7544B1;
            --dark-bg: #121212;
            --white: #FFFFFF;
        }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--dark-bg); 
            display: flex; justify-content: center;
            font-family: 'VT323', monospace;
            min-height: 100vh;
        }

        .app-shell {
            width: 100%; max-width: 480px;
            background-color: #5C94FC;
            background-image: linear-gradient(45deg, #4b80e1 25%, transparent 25%), linear-gradient(-45deg, #4b80e1 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #4b80e1 75%), linear-gradient(-45deg, transparent 75%, #4b80e1 75%);
            background-size: 40px 40px;
            border-left: 8px solid #000; border-right: 8px solid #000;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            min-height: 100vh; position: relative;
            display: flex; flex-direction: column;
        }

        * { box-sizing: border-box; border-radius: 0 !important; }
        h1, h2, h3, .pixel-font { font-family: 'Press Start 2P', cursive; text-transform: uppercase; }

        nav { background: var(--mario-red); padding: 1rem; border-bottom: 8px solid #000; z-index: 100; }
        .logo-text { font-size: 1rem; color: white; text-shadow: 4px 4px 0 #000; text-align: center; margin-bottom: 15px; }
        .nav-buttons { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; }
        
        .btn {
            display: block;
            width: 100%;
            padding: 12px; 
            font-family: 'Press Start 2P', cursive; 
            font-size: 0.55rem;
            cursor: pointer; 
            border: 4px solid #000;
            background: var(--coin-gold); 
            color: #000;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5); 
            text-decoration: none;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 5px;
        }
        .btn:active { box-shadow: none; transform: translate(4px, 4px); }
        .btn-green { background: var(--luigi-green); color: white; }
        .btn-blue { background: var(--mario-blue); color: white; }

        .view { display: none; width: 100%; padding: 1rem; flex-grow: 1; box-sizing: border-box; }
        .view.active { display: block; }

        .hero { text-align: center; padding: 1rem 0; }
        .hero h1 { font-size: 1.4rem; color: white; text-shadow: 4px 4px 0 #000; margin-bottom: 1rem; }
        .pixel-banner { width: 100%; background: #000; border: 6px solid white; padding: 8px; margin-bottom: 1rem; box-sizing: border-box; }

        #map { height: 250px; border: 6px solid #000; margin-bottom: 1.5rem; width: 100%; box-sizing: border-box; }

        .card-grid { display: flex; flex-direction: column; gap: 1.5rem; width: 100%; box-sizing: border-box; }
        .pixel-card { 
            background: #fff; 
            color: #000; 
            border: 6px solid #000; 
            padding: 1.5rem; 
            text-align: center; 
            box-shadow: 8px 8px 0 rgba(0,0,0,0.3); 
            width: 100%; 
            box-sizing: border-box; 
            position: relative;
        }
        .avatar-box { width: 60px; height: 60px; margin: 0 auto 10px; border: 4px solid #000; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 2rem; }

        .auth-container { background: #fff; border: 6px solid #000; padding: 1.5rem; color: #000; text-align: center; box-sizing: border-box; }
        .form-group { margin-bottom: 1rem; text-align: left; }
        .form-group label { display: block; font-size: 0.6rem; font-family: 'Press Start 2P'; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; border: 4px solid #000; font-family: 'VT323'; font-size: 1.2rem; box-sizing: border-box; }

        footer { text-align: center; padding: 2rem 1rem; background: #000; color: #888; font-size: 0.7rem; }
        
        .loading-overlay { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.8); z-index: 1000; 
            display: none; justify-content: center; align-items: center;
            color: white; font-family: 'Press Start 2P'; font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="app-shell">
        <div id="loading" class="loading-overlay">SYNCING DATA...</div>
        
        <nav>
            <div class="logo-text pixel-font" onclick="switchView('home')">PIXEL BIN HEROES</div>
            <div class="nav-buttons">
                <button class="btn" onclick="switchView('home')">WORLD MAP</button>
                <button class="btn btn-green" onclick="switchView('register')">NEW PLAYER</button>
            </div>
        </nav>

        <!-- HOME -->
        <div id="home-view" class="view active">
            <section class="hero">
                <h1>GLOBAL HERO BOARD</h1>
                <div class="pixel-banner">
                    <svg viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
                        <rect width="100" height="50" fill="#5C94FC" /><rect x="70" y="20" width="15" height="25" fill="#43B047" /><rect x="25" y="20" width="12" height="25" fill="#E52521" /><rect x="47" y="22" width="6" height="6" fill="#FFD700" />
                    </svg>
                </div>
            </section>
            <div id="map"></div>
            <div id="profiles-container" class="card-grid"></div>
        </div>

        <!-- REGISTER -->
        <div id="register-view" class="view">
            <h2 class="pixel-font" style="color:white; text-align:center; margin-bottom:1rem;">JOIN WORLD</h2>
            <div class="auth-container">
                <form id="signup-form">
                    <div class="form-group"><label>HERO NAME</label><input type="text" id="signup-name" required placeholder="e.g. BinMaster"></div>
                    <div class="form-group"><label>NEIGHBORHOOD</label><input type="text" id="signup-neighborhood" required placeholder="e.g. Cowan Heights"></div>
                    <div class="form-group"><label>TEAM / GROUP</label><input type="text" id="signup-group" placeholder="e.g. Scouts"></div>
                    <button type="submit" class="btn btn-green" style="width:100%; margin-top:10px;">ENTER THE WORLD</button>
                </form>
            </div>
        </div>

        <footer>
            <p>2026 PIXEL BIN HEROES | GLOBAL DATABASE ONLINE</p>
        </footer>
    </div>

    <div id="booking-modal" class="modal-overlay">
        <div class="modal-box" style="background:white; border:8px solid var(--mario-red); padding:1.5rem; width:90%; box-sizing: border-box;">
            <h2 class="pixel-font" style="font-size: 0.8rem; margin-bottom: 1rem; color:#000;">HIRE HERO</h2>
            <p id="booking-info" style="margin-bottom: 1.5rem; font-size: 1.2rem; color:#000;"></p>
            <button class="btn btn-green btn-full" onclick="alert('MISSION REQUESTED!')">SEND REQUEST</button>
            <button class="btn btn-full" style="background:#ccc; margin-top:10px;" onclick="closeModal()">CANCEL</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- GLOBAL SHARED DATABASE (npoint.io) ---
        // Using a persistent bin ID for this specific app
        const DB_ENDPOINT = 'https://api.npoint.io/e9036f0605a9607f287f'; 

        let map, heroes = [];

        async function initApp() {
            initMap();
            await syncDatabase();
        }

        async function syncDatabase() {
            showLoading(true);
            try {
                const response = await fetch(DB_ENDPOINT);
                const data = await response.json();
                heroes = data.heroes || [];
                renderProfiles();
                updateMap();
            } catch (e) {
                console.error("DB Sync Error:", e);
                // Fallback to local memory if global fails
                heroes = JSON.parse(localStorage.getItem('pb_global_cache') || '[]');
                renderProfiles();
            }
            showLoading(false);
        }

        async function saveToGlobalDB(newHero) {
            showLoading(true);
            heroes.push(newHero);
            
            // Update cache
            localStorage.setItem('pb_global_cache', JSON.stringify(heroes));

            try {
                await fetch(DB_ENDPOINT, {
                    method: 'POST', // npoint uses POST for updates
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ heroes: heroes })
                });
                alert("HERO ADDED TO THE GLOBAL WORLD!");
            } catch (e) {
                alert("Hero saved locally, but global sync failed. Check connection!");
            }
            showLoading(false);
            switchView('home');
            renderProfiles();
            updateMap();
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId + '-view').classList.add('active');
            if(viewId === 'home' && map) setTimeout(() => map.invalidateSize(), 200);
        }

        function initMap() {
            map = L.map('map', { scrollWheelZoom: false }).setView([47.54, -52.75], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        function updateMap() {
            // Remove old markers
            map.eachLayer(layer => { if(layer instanceof L.Marker) map.removeLayer(layer); });
            // Add new markers
            heroes.forEach(h => {
                L.marker([h.lat, h.lng]).addTo(map).bindPopup(`<b>${h.nickname}</b><br>${h.neighborhood}`);
            });
        }

        function renderProfiles() {
            const container = document.getElementById('profiles-container');
            container.innerHTML = '';
            if(heroes.length === 0) {
                container.innerHTML = '<p style="color:white; text-align:center;">No Heroes in the world yet. Be the first!</p>';
                return;
            }
            heroes.forEach(h => {
                const card = document.createElement('div');
                card.className = 'pixel-card';
                card.innerHTML = `
                    <div class="avatar-box">${h.avatar || '👾'}</div>
                    <div class="pixel-font" style="font-size:0.7rem;">${h.nickname}</div>
                    <div style="background:#000; color:#fff; padding:5px; font-size:0.8rem; margin:10px 0;">📍 ${h.neighborhood}</div>
                    <button class="btn btn-green btn-full" onclick="openBooking('${h.nickname}')">HIRE HERO</button>
                `;
                container.appendChild(card);
            });
        }

        function openBooking(name) {
            document.getElementById('booking-info').innerText = `SEND MISSION TO ${name}?`;
            document.getElementById('booking-modal').classList.add('active');
        }
        function closeModal() { document.getElementById('booking-modal').classList.remove('active'); }

        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const newHero = {
                id: Date.now(),
                nickname: document.getElementById('signup-name').value,
                neighborhood: document.getElementById('signup-neighborhood').value,
                group: document.getElementById('signup-group').value,
                avatar: "🦸‍♂️",
                lat: 47.54 + (Math.random()*0.06-0.03),
                lng: -52.75 + (Math.random()*0.06-0.03)
            };
            saveToGlobalDB(newHero);
            this.reset();
        });

        window.onload = initApp;
    </script>
</body>
</html>
